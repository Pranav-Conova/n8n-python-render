services:
  - type: web
    name: n8n-python-render
    runtime: docker
    healthCheckPath: /healthz
    envVars:
      # Core n8n config
      - key: N8N_HOST
        value: n8n-python-render.onrender.com
      - key: N8N_PORT
        value: "5678"
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_LISTEN_ADDRESS
        value: 0.0.0.0
      - key: WEBHOOK_URL
        value: https://n8n-python-render.onrender.com/
      - key: N8N_EDITOR_BASE_URL
        value: https://n8n-python-render.onrender.com
      - key: N8N_TRUST_PROXY
        value: "true"
      # 🔐 IMPORTANT — FIXED KEY (DO NOT CHANGE)
      - key: N8N_ENCRYPTION_KEY
        value: c0ef1bcd386b95758a4b6a240567d0b26d563550778323c3421ba5b149a3afcd
      # ⚙️ Disable telemetry
      - key: N8N_DIAGNOSTICS_ENABLED
        value: "false"
      - key: N8N_VERSION_NOTIFICATIONS_ENABLED
        value: "false"
      - key: N8N_TEMPLATES_ENABLED
        value: "false"
      # 🔐 AUTH (UI login enabled)
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "false"
      - key: N8N_DISABLE_UI_LOGIN
        value: "false"
      - key: N8N_USER_MANAGEMENT_DISABLED
        value: "false"
      # 🗄️ Postgres
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: ep-autumn-base-a13kmgro.ap-southeast-1.aws.neon.tech
      - key: DB_POSTGRESDB_PORT
        value: "5432"
      - key: DB_POSTGRESDB_DATABASE
        value: neondb
      - key: DB_POSTGRESDB_USER
        value: neondb_owner
      - key: DB_POSTGRESDB_PASSWORD
        value: npg_q8rJMeQjn7zx
      - key: DB_POSTGRESDB_SSL
        value: "true"
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: "false"
      # ⚡ Optional
      - key: N8N_RUNNERS_ENABLED
        value: "true"
      - key: NODE_OPTIONS
        value: "--dns-result-order=ipv4first"
      - key: PORT
        value: "5678"
