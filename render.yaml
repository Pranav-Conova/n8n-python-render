services:
  - type: web
    name: n8n-python-render
    runtime: docker
    healthCheckPath: /healthz
    # Persistent disk so SQLite data and credentials survive redeploys.
    # Render free-tier does not include persistent disks; upgrade to a paid
    # instance type or switch to PostgreSQL (see commented-out vars below).
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1
    envVars:
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_LISTEN_ADDRESS
        value: 0.0.0.0
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_SECURE_COOKIE
        value: "false"
      - key: N8N_DIAGNOSTICS_ENABLED
        value: "false"
      - key: N8N_VERSION_NOTIFICATIONS_ENABLED
        value: "false"
      - key: N8N_TEMPLATES_ENABLED
        value: "false"
      # REQUIRED: Set a strong, fixed random string to encrypt saved credentials.
      # Generate with: openssl rand -hex 32
      # IMPORTANT: Never change this value after first deploy — changing it will
      # make all existing credentials unreadable (causing login failures).
      # Set this once in the Render dashboard; it is intentionally not
      # auto-generated so that it remains stable across redeploys.
      - key: N8N_ENCRYPTION_KEY
        sync: false
      # Optional: persist workflows/credentials across redeploys by connecting
      # a Render PostgreSQL database and setting these variables.
      # - key: DB_TYPE
      #   value: postgresdb
      # - key: DB_POSTGRESDB_HOST
      #   fromDatabase:
      #     name: n8n-db
      #     property: host
      # - key: DB_POSTGRESDB_PORT
      #   fromDatabase:
      #     name: n8n-db
      #     property: port
      # - key: DB_POSTGRESDB_DATABASE
      #   fromDatabase:
      #     name: n8n-db
      #     property: database
      # - key: DB_POSTGRESDB_USER
      #   fromDatabase:
      #     name: n8n-db
      #     property: user
      # - key: DB_POSTGRESDB_PASSWORD
      #   fromDatabase:
      #     name: n8n-db
      #     property: password
      # - key: DB_POSTGRESDB_SSL_ENABLED
      #   value: "true"

# Uncomment to add a managed PostgreSQL database for persistent storage.
# databases:
#   - name: n8n-db
#     plan: starter
